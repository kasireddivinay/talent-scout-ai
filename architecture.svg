<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">TalentScout AI — Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#64748b">Catalyst Hackathon · Deccan AI</text>

  <!-- ── Input Box ── -->
  <rect x="30" y="80" width="130" height="60" rx="10" fill="#1e40af" />
  <text x="95" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="white">👤 Recruiter</text>
  <text x="95" y="122" text-anchor="middle" font-size="9" fill="#bfdbfe">Pastes Job Description</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="110" x2="200" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="180" y="104" text-anchor="middle" font-size="8" fill="#64748b">raw JD</text>

  <!-- ── Step 1: JD Parser ── -->
  <rect x="200" y="75" width="155" height="70" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="277" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">① JD Parser Agent</text>
  <text x="277" y="112" text-anchor="middle" font-size="9" fill="#475569">Claude Sonnet</text>
  <text x="277" y="126" text-anchor="middle" font-size="8" fill="#64748b">Role · Skills · Seniority</text>
  <text x="277" y="138" text-anchor="middle" font-size="8" fill="#64748b">Experience · Domain · Location</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="110" x2="395" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="375" y="104" text-anchor="middle" font-size="8" fill="#64748b">parsed_jd</text>

  <!-- ── Step 2: Matcher ── -->
  <rect x="395" y="75" width="160" height="70" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="475" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">② Matcher Agent</text>
  <text x="475" y="112" text-anchor="middle" font-size="9" fill="#475569">Claude Sonnet (batched)</text>
  <text x="475" y="126" text-anchor="middle" font-size="8" fill="#64748b">Scores all 15 candidates</text>
  <text x="475" y="138" text-anchor="middle" font-size="8" fill="#64748b">Match Score + Reasoning</text>

  <!-- Candidate Pool Box -->
  <rect x="400" y="170" width="150" height="45" rx="8" fill="#f3f0ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="475" y="190" text-anchor="middle" font-size="9" font-weight="600" fill="#6d28d9">📋 Candidate Pool</text>
  <text x="475" y="206" text-anchor="middle" font-size="8" fill="#7c3aed">15 realistic mock profiles</text>
  <line x1="475" y1="170" x2="475" y2="145" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Arrow 3 -->
  <line x1="555" y1="110" x2="595" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="575" y="104" text-anchor="middle" font-size="8" fill="#64748b">top_n</text>

  <!-- ── Step 3: Outreach ── -->
  <rect x="595" y="75" width="160" height="70" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="675" y="97" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">③ Outreach Agent</text>
  <text x="675" y="112" text-anchor="middle" font-size="9" fill="#475569">Claude Sonnet</text>
  <text x="675" y="126" text-anchor="middle" font-size="8" fill="#64748b">Simulates 4-turn conversation</text>
  <text x="675" y="138" text-anchor="middle" font-size="8" fill="#64748b">Interest Score + Next Action</text>

  <!-- Arrow 4: down from Outreach -->
  <line x1="675" y1="145" x2="675" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow 4b: down from Matcher (for non-outreach candidates) -->
  <line x1="475" y1="215" x2="475" y2="260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ── Step 4: Scorer ── -->
  <rect x="575" y="240" width="200" height="65" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="675" y="262" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">④ Composite Scorer</text>
  <text x="675" y="278" text-anchor="middle" font-size="9" fill="#475569">Composite = 60% Match + 40% Interest</text>
  <text x="675" y="292" text-anchor="middle" font-size="8" fill="#64748b">(configurable weights)</text>
  <text x="675" y="302" text-anchor="middle" font-size="8" fill="#64748b">→ Final ranked shortlist</text>

  <!-- Arrow 5 -->
  <line x1="675" y1="305" x2="675" y2="360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Step 5: Dashboard ── -->
  <rect x="30" y="360" width="840" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">⑤ Streamlit Dashboard</text>

  <!-- 4 tabs -->
  <rect x="60" y="395" width="180" height="48" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="150" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#1d4ed8">🏆 Ranked Shortlist</text>
  <text x="150" y="430" text-anchor="middle" font-size="8" fill="#64748b">Composite scores · Next Actions</text>
  <text x="150" y="441" text-anchor="middle" font-size="8" fill="#64748b">JSON export</text>

  <rect x="260" y="395" width="180" height="48" rx="8" fill="#f3f0ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="350" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#6d28d9">🔍 Match Details</text>
  <text x="350" y="430" text-anchor="middle" font-size="8" fill="#64748b">Skill analysis · Reasoning</text>
  <text x="350" y="441" text-anchor="middle" font-size="8" fill="#64748b">Red flags · Logistics</text>

  <rect x="460" y="395" width="180" height="48" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="550" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">💬 Outreach Convos</text>
  <text x="550" y="430" text-anchor="middle" font-size="8" fill="#64748b">Chat transcripts</text>
  <text x="550" y="441" text-anchor="middle" font-size="8" fill="#64748b">Engagement signals</text>

  <rect x="660" y="395" width="180" height="48" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="750" y="415" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">📋 Parsed JD</text>
  <text x="750" y="430" text-anchor="middle" font-size="8" fill="#64748b">Structured JD view</text>
  <text x="750" y="441" text-anchor="middle" font-size="8" fill="#64748b">Raw JSON</text>

  <!-- ── Score Legend ── -->
  <rect x="30" y="490" width="840" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="512" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">Scoring Framework</text>

  <!-- Match score breakdown -->
  <rect x="50" y="522" width="250" height="66" rx="8" fill="#eff6ff"/>
  <text x="175" y="540" text-anchor="middle" font-size="9" font-weight="700" fill="#1d4ed8">Match Score Weights</text>
  <text x="75" y="556" font-size="8" fill="#475569">🔵 Skills Overlap</text>
  <text x="280" y="556" text-anchor="end" font-size="8" font-weight="700" fill="#1d4ed8">40%</text>
  <text x="75" y="570" font-size="8" fill="#475569">🟣 Experience Fit</text>
  <text x="280" y="570" text-anchor="end" font-size="8" font-weight="700" fill="#1d4ed8">25%</text>
  <text x="75" y="584" font-size="8" fill="#475569">🟡 Domain Fit</text>
  <text x="280" y="584" text-anchor="end" font-size="8" font-weight="700" fill="#1d4ed8">20%</text>

  <!-- Interest score breakdown -->
  <rect x="320" y="522" width="250" height="66" rx="8" fill="#f0fdf4"/>
  <text x="445" y="540" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">Interest Score Signals</text>
  <text x="340" y="556" font-size="8" fill="#475569">✅ Openness to new roles</text>
  <text x="340" y="570" font-size="8" fill="#475569">✅ Salary / location fit</text>
  <text x="340" y="584" font-size="8" fill="#475569">✅ Conversation engagement</text>

  <!-- Composite -->
  <rect x="590" y="522" width="260" height="66" rx="8" fill="#fffbeb"/>
  <text x="720" y="540" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Composite = 60% M + 40% I</text>
  <text x="608" y="556" font-size="8" fill="#475569">🏆 Top Pick  82+</text>
  <text x="608" y="570" font-size="8" fill="#475569">⭐ Strong    68–81</text>
  <text x="608" y="584" font-size="8" fill="#475569">✅ Good Fit  52–67</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
